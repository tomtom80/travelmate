name: Demo Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven verify
        run: ./mvnw -B -ntp verify

  publish-images:
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: travelmate-gateway
            image: travelmate-gateway
          - module: travelmate-iam
            image: travelmate-iam
          - module: travelmate-trips
            image: travelmate-trips
          - module: travelmate-expense
            image: travelmate-expense

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image namespace
        id: vars
        run: echo "namespace=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            MODULE=${{ matrix.module }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.namespace }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.namespace }}/${{ matrix.image }}:demo

  deploy-demo:
    runs-on: ubuntu-latest
    needs: publish-images
    timeout-minutes: 20
    environment: demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare SSH key
        env:
          DEMO_SSH_PRIVATE_KEY: ${{ secrets.DEMO_SSH_PRIVATE_KEY }}
          DEMO_SSH_PORT: ${{ secrets.DEMO_SSH_PORT }}
        run: |
          ssh_port="${DEMO_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEMO_SSH_PRIVATE_KEY" > ~/.ssh/demo_key
          chmod 600 ~/.ssh/demo_key
          cat <<EOF > ~/.ssh/config
          Host demo
            HostName ${{ secrets.DEMO_SSH_HOST }}
            User ${{ secrets.DEMO_SSH_USER }}
            Port ${ssh_port}
            IdentityFile ~/.ssh/demo_key
            StrictHostKeyChecking accept-new
          EOF

      - name: Lowercase image namespace
        id: vars
        run: echo "namespace=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Upload demo deployment files
        env:
          DEMO_APP_DIR: ${{ secrets.DEMO_APP_DIR }}
        run: |
          ssh demo "mkdir -p '${DEMO_APP_DIR}/docker/keycloak/themes' '${DEMO_APP_DIR}/scripts'"
          tar czf - \
            docker-compose.demo.yml \
            scripts/deploy-demo.sh \
            docker/keycloak/realm-export.template.json \
            docker/keycloak/init-realm-from-env.sh \
            docker/keycloak/init-smtp-from-env.sh \
            docker/keycloak/themes \
          | ssh demo "tar xzf - -C '${DEMO_APP_DIR}'"

      - name: Upload demo environment file
        env:
          DEMO_APP_DIR: ${{ secrets.DEMO_APP_DIR }}
          DEMO_ENV_FILE: ${{ secrets.DEMO_ENV_FILE }}
        run: |
          ssh demo "mkdir -p '${DEMO_APP_DIR}'"
          printf '%s' "$DEMO_ENV_FILE" | ssh demo "cat > '${DEMO_APP_DIR}/.env.demo'"

      - name: Deploy demo stack
        env:
          DEMO_APP_DIR: ${{ secrets.DEMO_APP_DIR }}
          DEMO_GHCR_READ_TOKEN: ${{ secrets.DEMO_GHCR_READ_TOKEN }}
        run: |
          ssh demo "\
            cd '${DEMO_APP_DIR}' && \
            IMAGE_REGISTRY=ghcr.io \
            IMAGE_NAMESPACE='${{ steps.vars.outputs.namespace }}' \
            IMAGE_TAG='${{ github.sha }}' \
            GHCR_USERNAME='${{ github.repository_owner }}' \
            GHCR_TOKEN='${DEMO_GHCR_READ_TOKEN}' \
            bash ./scripts/deploy-demo.sh"
