name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Purge corrupt cached JARs (cache-restore safety net)
        run: |
          set +e                    
          find ~/.m2/repository -name '*.jar' -print0 2>/dev/null | while IFS= read -r -d '' jar; do                                                                        
            if ! unzip -tq "$jar" >/dev/null 2>&1; then                                                                                                                     
              echo "Corrupt JAR detected, purging directory: $jar"                                                                                                          
              rm -rf "$(dirname "$jar")"                                                                                                                                    
            fi                                                                                                                                                              
          done                                                                                                                                                              
          exit 0       

      - name: Run Maven verify
        run: ./mvnw -B -ntp verify
