server:
  port: 8080

spring:
  application:
    name: travelmate-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: root-redirect
              uri: no://op
              predicates:
                - Path=/
              filters:
                - RedirectTo=302, /iam/
            - id: iam-public
              uri: ${IAM_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/iam/,/iam/signup,/iam/signup/**,/iam/css/**,/iam/images/**
            - id: iam
              uri: ${IAM_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/iam/**
              filters:
                - TokenRelay=
            - id: trips
              uri: ${TRIPS_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/trips/**
              filters:
                - TokenRelay=
            - id: expense
              uri: ${EXPENSE_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/expense/**
              filters:
                - TokenRelay=

  security:
    oauth2:
      client:
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_AUTH_URI:http://localhost:7082/realms/travelmate/protocol/openid-connect/auth}
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:7082/realms/travelmate/protocol/openid-connect/token}
            jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:7082/realms/travelmate/protocol/openid-connect/certs}
            user-info-uri: ${KEYCLOAK_USERINFO_URI:http://localhost:7082/realms/travelmate/protocol/openid-connect/userinfo}
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: travelmate-gateway
            client-secret: ${KEYCLOAK_CLIENT_SECRET:travelmate-gateway-secret}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

keycloak:
  end-session-uri: ${KEYCLOAK_END_SESSION_URI:http://localhost:7082/realms/travelmate/protocol/openid-connect/logout}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
    gateway:
      enabled: true
