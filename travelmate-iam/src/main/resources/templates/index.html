<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <article class="page-hero page-hero--party">
        <div class="page-hero__layout">
            <div class="page-hero__copy">
                <p class="page-hero__eyebrow" th:text="#{nav.travelParty}">Reisepartei</p>
                <hgroup>
                    <h1 th:text="#{nav.travelParty}">Reisepartei</h1>
                    <p class="page-hero__lead" th:text="#{travelParty.manageMembers}">Mitglieder verwalten</p>
                </hgroup>
                <div class="page-actions">
                    <a href="/iam/dashboard" role="button" th:text="#{dashboard.title}">Meine Reisepartei</a>
                </div>
            </div>
            <div class="page-hero__art" aria-hidden="true">
                <svg viewBox="0 0 240 160">
                    <!-- Stylized group of people icon -->
                    <circle cx="120" cy="55" r="25"></circle>
                    <path d="M70 120c0-20 20-35 50-35s50 15 50 35"></path>
                    <circle cx="75" cy="75" r="18"></circle>
                    <path d="M40 125c0-15 15-25 35-25s35 10 35 25"></path>
                    <circle cx="165" cy="75" r="18"></circle>
                    <path d="M130 125c0-15 15-25 35-25s35 10 35 25"></path>
                </svg>
            </div>
        </div>
    </article>
</div>
</body>
</html>
