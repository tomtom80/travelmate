<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <table th:if="${!dependents.isEmpty()}">
        <thead>
            <tr>
                <th th:text="#{child.firstName}">Vorname</th>
                <th th:text="#{child.lastName}">Nachname</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="dep : ${dependents}">
                <td th:text="${dep.firstName}"></td>
                <td th:text="${dep.lastName}"></td>
            </tr>
        </tbody>
    </table>
    <p th:if="${dependents.isEmpty()}" th:text="#{child.empty}">Noch keine Kinder eingetragen.</p>

    <h3 th:text="#{child.add}">Kind hinzufuegen</h3>
    <form hx-post th:hx-post="@{/tenants/{tid}/accounts/{aid}/dependents(tid=${tenantId},aid=${accountId})}"
          hx-target="#dependents"
          hx-swap="innerHTML">
        <div>
            <label for="depFirstName" th:text="#{child.firstName}">Vorname</label>
            <input type="text" id="depFirstName" name="firstName" required>
        </div>
        <div>
            <label for="depLastName" th:text="#{child.lastName}">Nachname</label>
            <input type="text" id="depLastName" name="lastName" required>
        </div>
        <button type="submit" th:text="#{child.submit}">Hinzufuegen</button>
    </form>
</div>
</body>
</html>
