<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="companionList">
    <figure class="table-cards">
        <table th:if="${!dependents.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{companion.firstName}">Vorname</th>
                    <th th:text="#{companion.lastName}">Nachname</th>
                    <th th:text="#{common.dateOfBirth}">Geburtsdatum</th>
                    <th class="table-actions-header" th:text="#{common.actions}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dep : ${dependents}">
                    <td th:data-label="#{companion.firstName}" th:text="${dep.firstName()}"></td>
                    <td th:data-label="#{companion.lastName}" th:text="${dep.lastName()}"></td>
                    <td th:data-label="#{common.dateOfBirth}" th:text="${dep.dateOfBirth()}"></td>
                    <td th:data-label="#{common.actions}">
                        <div class="action-col">
                            <button hx-delete th:hx-delete="@{'/dashboard/companions/' + ${dep.dependentId()}}"
                                    hx-target="#companions"
                                    hx-swap="innerHTML"
                                    hx-confirm th:hx-confirm="#{companion.deleteConfirm}"
                                    hx-disabled-elt="this"
                                    class="btn-icon btn-icon--danger"
                                    th:title="#{common.delete}" th:aria-label="#{common.delete}">
                                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${dependents.isEmpty()}" th:text="#{companion.empty}">Noch keine Mitreisenden eingetragen.</p>
</div>
</body>
</html>
