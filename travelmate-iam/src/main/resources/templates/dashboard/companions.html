<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="companionList">
    <figure>
        <table th:if="${!dependents.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{companion.firstName}">Vorname</th>
                    <th th:text="#{companion.lastName}">Nachname</th>
                    <th th:text="#{common.dateOfBirth}">Geburtsdatum</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dep : ${dependents}">
                    <td th:text="${dep.firstName()}"></td>
                    <td th:text="${dep.lastName()}"></td>
                    <td th:text="${dep.dateOfBirth()}"></td>
                    <td>
                        <button hx-delete th:hx-delete="@{'/dashboard/companions/' + ${dep.dependentId()}}"
                                hx-target="#companions"
                                hx-swap="innerHTML"
                                hx-confirm th:hx-confirm="#{companion.deleteConfirm}"
                                class="outline secondary"
                                th:text="#{common.delete}">Loeschen</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${dependents.isEmpty()}" th:text="#{companion.empty}">Noch keine Mitreisenden eingetragen.</p>
</div>
</body>
</html>
