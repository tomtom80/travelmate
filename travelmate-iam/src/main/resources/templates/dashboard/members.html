<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="memberList">
    <div th:if="${memberError}" class="error">
        <p th:text="#{${memberError}}"></p>
    </div>
    <figure class="table-cards">
        <table th:if="${!members.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{member.firstName}">Vorname</th>
                    <th th:text="#{member.lastName}">Nachname</th>
                    <th th:text="#{member.email}">E-Mail</th>
                    <th th:text="#{common.dateOfBirth}">Geburtsdatum</th>
                    <th class="table-actions-header" th:text="#{common.actions}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${members}">
                    <td th:data-label="#{member.firstName}" th:text="${m.firstName()}"></td>
                    <td th:data-label="#{member.lastName}" th:text="${m.lastName()}"></td>
                    <td th:data-label="#{member.email}" th:text="${m.email()}"></td>
                    <td th:data-label="#{common.dateOfBirth}" th:text="${m.dateOfBirth()}"></td>
                    <td th:data-label="#{common.actions}">
                        <div class="action-col">
                            <button th:if="${currentAccount != null and m.accountId() != currentAccount.accountId().value()}"
                                    hx-delete th:hx-delete="@{'/dashboard/members/' + ${m.accountId()}}"
                                    hx-target="#members"
                                    hx-swap="innerHTML"
                                    hx-confirm th:hx-confirm="#{member.deleteConfirm}"
                                    hx-disabled-elt="this"
                                    class="btn-icon btn-icon--danger"
                                    th:title="#{common.delete}" th:aria-label="#{common.delete}">
                                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${members.isEmpty()}" th:text="#{member.empty}">Noch keine Mitglieder.</p>
</div>
</body>
</html>
