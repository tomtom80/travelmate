<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <div id="tenant-header" th:fragment="tenantHeader" class="page-hero page-hero--party">
        <div class="page-hero__layout">
            <div class="page-hero__copy">
                <p class="page-hero__eyebrow" th:text="#{nav.travelParty}">Reisepartei</p>
                <hgroup style="margin-bottom:0;">
                    <h1 style="margin-bottom:0;" th:text="#{dashboard.title}">Meine Reisepartei</h1>
                    <p th:text="${tenant.name()}">Reisepartei-Name</p>
                </hgroup>
                <p class="page-hero__lead"
                   th:if="${tenant.description() != null and !tenant.description().isEmpty()}"
                   th:text="${tenant.description()}"></p>
                <div class="page-actions">
                    <button type="button" class="btn-icon"
                            onclick="document.getElementById('rename-tenant-dialog').showModal()"
                            th:title="#{travelParty.rename}" th:aria-label="#{travelParty.rename}">
                        <svg th:replace="~{fragments/icons :: icon-edit}"></svg>
                        <span class="sr-only" th:text="#{travelParty.rename}">Reisepartei umbenennen</span>
                    </button>
                </div>
            </div>
            <div class="page-hero__art" aria-hidden="true">
                <svg th:replace="~{fragments/heroes :: hero-party}"></svg>
            </div>
        </div>
    </div>

    <!-- Rename Tenant Dialog -->
    <dialog id="rename-tenant-dialog">
        <article>
            <h3 th:text="#{travelParty.rename}">Reisepartei umbenennen</h3>
            <form hx-post th:hx-post="@{/dashboard/tenant/rename}"
                  hx-target="#tenant-header"
                  hx-swap="outerHTML"
                  hx-on::after-request="if(event.detail.successful) document.getElementById('rename-tenant-dialog').close()">
                <label>
                    <span th:text="#{travelParty.name}">Name</span>
                    <input type="text" name="name" required th:value="${tenant.name()}">
                </label>
                <div class="grid">
                    <button type="button" class="outline"
                            onclick="document.getElementById('rename-tenant-dialog').close()"
                            th:text="#{common.cancel}">Abbrechen</button>
                    <button type="submit" th:text="#{common.save}">Speichern</button>
                </div>
            </form>
        </article>
    </dialog>

    <section class="section-card">
        <div class="section-heading">
            <div>
                <h2 th:text="#{dashboard.members}">Mitglieder</h2>
            </div>
        </div>
        <div id="members">
            <div th:replace="~{dashboard/members :: memberList}"></div>
        </div>

        <h3 th:text="#{member.invite}">Mitglied einladen</h3>
        <form hx-post th:hx-post="@{/dashboard/members}"
              hx-target="#members"
              hx-swap="innerHTML"
              hx-disabled-elt="find [type=submit]"
              hx-on::after-request="if(event.detail.successful) this.reset()">
            <div class="grid">
                <label>
                    <span th:text="#{member.firstName}">Vorname</span>
                    <input type="text" name="firstName" required>
                </label>
                <label>
                    <span th:text="#{member.lastName}">Nachname</span>
                    <input type="text" name="lastName" required>
                </label>
            </div>
            <div class="grid">
                <label>
                    <span th:text="#{member.email}">E-Mail</span>
                    <input type="email" name="email" required>
                </label>
                <label>
                    <span th:text="#{common.dateOfBirth}">Geburtsdatum</span>
                    <input type="date" name="dateOfBirth" required>
                </label>
            </div>
            <button type="submit" th:text="#{member.invite}">Mitglied einladen</button>
        </form>
    </section>

    <section class="section-card">
        <div class="section-heading">
            <div>
                <h2 th:text="#{dashboard.companions}">Mitreisende</h2>
            </div>
        </div>
        <div id="companions">
            <div th:replace="~{dashboard/companions :: companionList}"></div>
        </div>

        <h3 th:text="#{companion.add}">Mitreisende(n) hinzufuegen</h3>
        <form hx-post th:hx-post="@{/dashboard/companions}"
              hx-target="#companions"
              hx-swap="innerHTML"
              hx-disabled-elt="find [type=submit]"
              hx-on::after-request="if(event.detail.successful) this.reset()">
            <div class="grid">
                <label>
                    <span th:text="#{companion.firstName}">Vorname</span>
                    <input type="text" name="firstName" required>
                </label>
                <label>
                    <span th:text="#{companion.lastName}">Nachname</span>
                    <input type="text" name="lastName" required>
                </label>
            </div>
            <label>
                <span th:text="#{common.dateOfBirth}">Geburtsdatum</span>
                <input type="date" name="dateOfBirth">
            </label>
            <button type="submit" th:text="#{companion.submit}">Hinzufuegen</button>
        </form>
    </section>

    <section class="section-card section--danger">
        <h2 th:text="#{dashboard.dangerZone}">Gefahrenzone</h2>
        <p th:text="#{dashboard.deleteTenantHint}">Das Loeschen der Reisepartei entfernt alle Mitglieder und Mitreisenden.</p>
        <div id="delete-error"></div>
        <button hx-delete th:hx-delete="@{/dashboard/tenant}"
                hx-confirm th:hx-confirm="#{dashboard.deleteTenantConfirm}"
                hx-target="#delete-error"
                hx-swap="innerHTML"
                hx-disabled-elt="this"
                class="outline secondary"
                th:text="#{dashboard.deleteTenant}">Reisepartei loeschen</button>
    </section>
</div>
</body>
</html>
