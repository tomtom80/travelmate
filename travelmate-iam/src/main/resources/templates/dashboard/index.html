<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <h1 th:text="#{dashboard.title}">Meine Reisepartei</h1>

    <section>
        <h2 th:text="${tenant.name()}">Reisepartei-Name</h2>
        <p th:if="${tenant.description() != null and !tenant.description().isEmpty()}"
           th:text="${tenant.description()}"></p>
    </section>

    <section>
        <h3 th:text="#{dashboard.members}">Mitglieder</h3>
        <table th:if="${!members.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{member.firstName}">Vorname</th>
                    <th th:text="#{member.lastName}">Nachname</th>
                    <th th:text="#{member.email}">E-Mail</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${members}">
                    <td th:text="${m.firstName()}"></td>
                    <td th:text="${m.lastName()}"></td>
                    <td th:text="${m.email()}"></td>
                </tr>
            </tbody>
        </table>
        <p th:if="${members.isEmpty()}" th:text="#{member.empty}">Noch keine Mitglieder.</p>
    </section>

    <section>
        <h3 th:text="#{dashboard.companions}">Mitreisende</h3>
        <div id="companions">
            <div th:replace="~{dashboard/companions :: companionList}"></div>
        </div>

        <h4 th:text="#{companion.add}">Mitreisende(n) hinzufuegen</h4>
        <form hx-post th:hx-post="@{/dashboard/companions}"
              hx-target="#companions"
              hx-swap="innerHTML">
            <div>
                <label for="depFirstName" th:text="#{companion.firstName}">Vorname</label>
                <input type="text" id="depFirstName" name="firstName" required>
            </div>
            <div>
                <label for="depLastName" th:text="#{companion.lastName}">Nachname</label>
                <input type="text" id="depLastName" name="lastName" required>
            </div>
            <button type="submit" th:text="#{companion.submit}">Hinzufuegen</button>
        </form>
    </section>
</div>
</body>
</html>
