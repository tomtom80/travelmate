<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <h1 th:text="#{travelGroup.title}">Reisegruppen</h1>
    <p><a th:href="@{/tenants/new}" th:text="#{travelGroup.create}">Neue Reisegruppe anlegen</a></p>
    <table th:if="${!tenants.isEmpty()}">
        <thead>
            <tr>
                <th th:text="#{travelGroup.name}">Name</th>
                <th th:text="#{travelGroup.description}">Beschreibung</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tenant : ${tenants}">
                <td th:text="${tenant.name}"></td>
                <td th:text="${tenant.description}"></td>
                <td><a th:href="@{/tenants/{id}(id=${tenant.tenantId})}" th:text="#{travelGroup.detail}">Details</a></td>
            </tr>
        </tbody>
    </table>
    <p th:if="${tenants.isEmpty()}" th:text="#{travelGroup.empty}">Noch keine Reisegruppen vorhanden.</p>
</div>
</body>
</html>
