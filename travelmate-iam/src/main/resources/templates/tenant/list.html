<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <h1 th:text="#{travelParty.title}">Reisepartei</h1>
    <p><a th:href="@{/tenants/new}" th:text="#{travelParty.create}">Neue Reisepartei anlegen</a></p>
    <table class="responsive-card-table" th:if="${!tenants.isEmpty()}">
        <thead>
            <tr>
                <th th:text="#{travelParty.name}">Name</th>
                <th th:text="#{travelParty.description}">Beschreibung</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tenant : ${tenants}">
                <td th:data-label="#{travelParty.name}" th:text="${tenant.name}"></td>
                <td th:data-label="#{travelParty.description}" th:text="${tenant.description}"></td>
                <td th:data-label="#{invitation.actions}">
                    <div style="display:flex; gap:0.5rem; justify-content: flex-end;">
                        <a th:href="@{/tenants/{id}(id=${tenant.tenantId})}" role="button" class="outline" style="padding: 0.5rem 0.8rem;" th:text="#{travelParty.detail}">Details</a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <p th:if="${tenants.isEmpty()}" th:text="#{travelParty.empty}">Noch keine Reisepartei vorhanden.</p>
</div>
</body>
</html>
