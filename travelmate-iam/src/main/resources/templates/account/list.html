<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <h1 th:text="#{member.title} + ' — ' + ${tenant.name}">Mitglieder</h1>
    <p><a th:href="@{/tenants/{id}/accounts/new(id=${tenant.tenantId})}" th:text="#{member.register}">Neues Mitglied registrieren</a></p>
    <table th:if="${!accounts.isEmpty()}">
        <thead>
            <tr>
                <th th:text="#{member.username}">Benutzername</th>
                <th th:text="#{member.name}">Name</th>
                <th th:text="#{member.email}">E-Mail</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="account : ${accounts}">
                <td th:text="${account.username}"></td>
                <td th:text="${account.firstName + ' ' + account.lastName}"></td>
                <td th:text="${account.email}"></td>
                <td><a th:href="@{/tenants/{tid}/accounts/{aid}(tid=${tenant.tenantId},aid=${account.accountId})}" th:text="#{member.detail}">Details</a></td>
            </tr>
        </tbody>
    </table>
    <p th:if="${accounts.isEmpty()}" th:text="#{member.empty}">Noch keine Mitglieder vorhanden.</p>
    <p><a th:href="@{/tenants/{id}(id=${tenant.tenantId})}" th:text="#{member.backToGroup}">Zurueck zur Reisegruppe</a></p>
</div>
</body>
</html>
