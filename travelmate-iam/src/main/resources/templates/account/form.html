<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<body>
<div th:fragment="content">
    <h1>Neuen Account registrieren</h1>
    <form th:action="@{/tenants/{id}/accounts(id=${tenantId})}" method="post">
        <div>
            <label for="keycloakUserId">Keycloak User ID</label>
            <input type="text" id="keycloakUserId" name="keycloakUserId" required>
        </div>
        <div>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div>
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="firstName">Vorname</label>
            <input type="text" id="firstName" name="firstName" required>
        </div>
        <div>
            <label for="lastName">Nachname</label>
            <input type="text" id="lastName" name="lastName" required>
        </div>
        <button type="submit">Registrieren</button>
    </form>
    <p><a th:href="@{/tenants/{id}/accounts(id=${tenantId})}">Zurueck zur Liste</a></p>
</div>
</body>
</html>
