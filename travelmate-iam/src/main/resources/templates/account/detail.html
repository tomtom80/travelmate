<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <h1 th:text="${account.firstName + ' ' + account.lastName}"></h1>
    <dl>
        <dt th:text="#{member.username}">Benutzername</dt>
        <dd th:text="${account.username}"></dd>
        <dt th:text="#{member.email}">E-Mail</dt>
        <dd th:text="${account.email}"></dd>
        <dt th:text="#{nav.travelGroup}">Reisegruppe</dt>
        <dd th:text="${tenant.name}"></dd>
    </dl>

    <h2 th:text="#{child.title}">Mitreisende Kinder</h2>
    <div id="dependents"
         hx-get th:hx-get="@{/tenants/{tid}/accounts/{aid}/dependents(tid=${tenant.tenantId},aid=${account.accountId})}"
         hx-trigger="load"
         hx-swap="innerHTML">
    </div>

    <p><a th:href="@{/tenants/{id}/accounts(id=${tenant.tenantId})}" th:text="#{member.backToList}">Zurueck zur Liste</a></p>
</div>
</body>
</html>
