<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/iam/images/icon-192.png">
    <link rel="apple-touch-icon" href="/iam/images/icon-192.png">
    <title th:text="${title} ? ${title} + ' — Travelmate' : 'Travelmate'">Travelmate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
</head>
<body>
    <nav class="container nav-bar">
        <ul>
            <li>
                <a href="/iam/dashboard" class="nav-brand">
                    <img th:src="@{/images/logo.svg}" alt="Travelmate" class="nav-logo">
                </a>
            </li>
            <li class="nav-toggle">
                <button type="button" aria-label="Menu" aria-expanded="false"
                        onclick="var n=this.closest('nav');n.classList.toggle('nav-open');this.setAttribute('aria-expanded',n.classList.contains('nav-open'))">
                    <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </li>
        </ul>
        <ul class="nav-links">
            <li><a href="/iam/dashboard" th:text="#{nav.travelParty}">Reisepartei</a></li>
            <li><a href="/trips/" th:text="#{nav.trips}">Reisen</a></li>
            <li><a href="/trips/recipes" th:text="#{nav.recipes}">Rezepte</a></li>
            <li class="nav-lang-item">
                <details class="nav-lang-dropdown">
                    <summary th:text="#{nav.language}">Sprache</summary>
                    <div class="nav-lang-panel">
                        <a th:href="@{''(lang='de')}" th:text="#{common.german}">Deutsch</a>
                        <a th:href="@{''(lang='en')}" th:text="#{common.english}">English</a>
                    </div>
                </details>
            </li>
            <li>
                <a href="/logout" class="nav-logout-btn" th:text="#{nav.logout}"
                   onclick="event.preventDefault(); this.closest('li').querySelector('form').submit();">Abmelden</a>
                <form method="post" action="/logout" style="display:none;"></form>
            </li>
        </ul>
    </nav>
    <main class="container" th:insert="~{${view} :: content}">
    </main>
    <div id="toast-container" aria-live="polite"></div>
    <footer class="container">
        <small>Travelmate</small>
    </footer>
    <script>
    document.addEventListener('submit', function(e) {
        var btn = e.target.querySelector('button[type=submit]');
        if (btn && !e.target.hasAttribute('hx-post') && !e.target.hasAttribute('hx-delete')) {
            btn.setAttribute('aria-busy', 'true');
            btn.disabled = true;
        }
    });
    document.addEventListener('showToast', function(e) {
        var d = e.detail, level = d.level || 'info', msg = d.message || '';
        var toast = document.createElement('div');
        toast.className = 'toast toast-' + level;
        toast.setAttribute('role', level === 'error' ? 'alert' : 'status');
        var text = document.createElement('span');
        text.textContent = msg;
        toast.appendChild(text);
        var btn = document.createElement('button');
        btn.className = 'toast-close';
        btn.setAttribute('aria-label', 'Close');
        btn.textContent = '\u00d7';
        btn.onclick = function() { toast.remove(); };
        toast.appendChild(btn);
        document.getElementById('toast-container').appendChild(toast);
        if (level !== 'error') {
            setTimeout(function() {
                toast.style.animation = 'toastOut 0.3s ease-in forwards';
                setTimeout(function() { toast.remove(); }, 300);
            }, 4000);
        }
    });
    /* Kebab menu: close others on open, close on outside click/Escape */
    document.addEventListener('toggle', function(e) {
        if (!(e.target instanceof HTMLDetailsElement)) { return; }
        var isMenu = e.target.classList.contains('kebab-menu');
        if (!isMenu || !e.target.open) { return; }
        document.querySelectorAll('details.kebab-menu[open]').forEach(function(menu) {
            if (menu !== e.target) { menu.open = false; }
        });
    });
    document.addEventListener('click', function(e) {
        document.querySelectorAll('details.kebab-menu[open]').forEach(function(menu) {
            if (!menu.contains(e.target)) { menu.open = false; }
        });
        var nav = document.querySelector('nav.nav-open');
        if (nav && !nav.contains(e.target)) { nav.classList.remove('nav-open'); }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') { return; }
        document.querySelectorAll('details.kebab-menu[open]').forEach(function(menu) { menu.open = false; });
        document.querySelectorAll('nav.nav-open').forEach(function(n) { n.classList.remove('nav-open'); });
    });
    </script>
</body>
</html>
