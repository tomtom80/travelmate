<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ? ${title} + ' — Travelmate' : 'Travelmate'">Travelmate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="container nav-bar">
        <ul>
            <li>
                <a th:href="@{/}" class="nav-brand">
                    <img th:src="@{/images/logo.svg}" alt="Travelmate" class="nav-logo">
                </a>
            </li>
            <li class="nav-toggle">
                <button type="button" aria-label="Menu" aria-expanded="false"
                        onclick="var n=this.closest('nav');n.classList.toggle('nav-open');this.setAttribute('aria-expanded',n.classList.contains('nav-open'))">
                    <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </li>
        </ul>
        <ul class="nav-links">
            <li><a th:href="@{/signup}" th:text="#{landing.register}">Registrieren</a></li>
            <li class="nav-lang">
                <a th:href="@{''(lang='de')}" th:text="#{common.german}">DE</a> /
                <a th:href="@{''(lang='en')}" th:text="#{common.english}">EN</a>
            </li>
            <li><a href="/oauth2/authorization/keycloak" th:text="#{landing.login}">Anmelden</a></li>
        </ul>
    </nav>
    <main class="container" th:insert="~{${view} :: content}">
    </main>
    <footer class="container">
        <small>&copy; Travelmate</small>
    </footer>
</body>
</html>
