<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ? ${title} + ' — Travelmate' : 'Travelmate'">Travelmate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-shell section-iam">
    <nav class="container nav-bar">
        <ul>
            <li>
                <a th:href="@{/}" class="nav-brand">
                    <img th:src="@{/images/logo.svg}" alt="Travelmate" class="nav-logo">
                </a>
            </li>
            <li class="nav-toggle">
                <button type="button" aria-label="Menu" aria-expanded="false"
                        onclick="var n=this.closest('nav');n.classList.toggle('nav-open');this.setAttribute('aria-expanded',n.classList.contains('nav-open'))">
                    <svg th:replace="~{fragments/icons :: icon-menu}"></svg>
                </button>
            </li>
        </ul>
        <ul class="nav-links">
            <li><a th:href="@{/signup}" th:text="#{landing.register}">Registrieren</a></li>
            <li class="nav-lang-item">
                <details class="nav-lang-dropdown">
                    <summary th:text="#{nav.language}">Sprache</summary>
                    <div class="nav-lang-panel">
                        <a th:href="@{''(lang='de')}" th:text="#{common.german}">Deutsch</a>
                        <a th:href="@{''(lang='en')}" th:text="#{common.english}">English</a>
                    </div>
                </details>
            </li>
            <li><a href="/oauth2/authorization/keycloak" th:text="#{landing.login}">Anmelden</a></li>
        </ul>
    </nav>
    <main class="container app-main" th:insert="~{${view} :: content}">
    </main>
    <footer class="container">
        <small>&copy; Travelmate</small>
    </footer>
</body>
</html>
