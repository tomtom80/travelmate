<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="invitationList">
    <figure>
        <table th:if="${!invitations.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{invitation.member}">Mitglied</th>
                    <th th:text="#{trip.status}">Status</th>
                    <th th:text="#{invitation.actions}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inv : ${invitations}">
                    <td>
                        <span th:text="${inv.inviteeName()}"></span>
                        <small th:if="${inv.invitationType() == 'EXTERNAL'}" th:text="#{invitation.statusExternal}"> (extern)</small>
                    </td>
                    <td><mark th:text="#{${'invitation.status.' + inv.status()}}"></mark></td>
                    <td th:if="${inv.status() == 'PENDING' && inv.inviteeId() == currentMemberId}">
                        <div class="grid">
                            <form hx-post th:hx-post="@{/{tid}/invitations/{iid}/accept(tid=${inv.tripId()},iid=${inv.invitationId()})}"
                                  hx-target="#invitations"
                                  hx-swap="innerHTML"
                                  hx-disabled-elt="find [type=submit]">
                                <button type="submit" th:text="#{invitation.accept}">Annehmen</button>
                            </form>
                            <form hx-post th:hx-post="@{/{tid}/invitations/{iid}/decline(tid=${inv.tripId()},iid=${inv.invitationId()})}"
                                  hx-target="#invitations"
                                  hx-swap="innerHTML"
                                  hx-disabled-elt="find [type=submit]">
                                <button type="submit" class="outline secondary" th:text="#{invitation.decline}">Ablehnen</button>
                            </form>
                        </div>
                    </td>
                    <td th:if="${inv.status() != 'PENDING' || inv.inviteeId() != currentMemberId}"></td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${invitations.isEmpty()}" th:text="#{invitation.empty}">Noch keine Einladungen.</p>
</div>
</body>
</html>
