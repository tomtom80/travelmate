<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="invitationList">
    <figure class="table-cards">
        <table class="responsive-card-table" th:if="${!invitations.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{invitation.member}">Mitglied</th>
                    <th th:text="#{trip.status}">Status</th>
                    <th th:text="#{invitation.actions}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inv : ${invitations}">
                    <td th:data-label="#{invitation.member}">
                        <span th:text="${inv.inviteeName()}"></span>
                        <small th:if="${inv.invitationType() == 'EXTERNAL'}" th:text="#{invitation.statusExternal}"> (extern)</small>
                    </td>
                    <td th:data-label="#{trip.status}"><mark th:text="#{${'invitation.status.' + inv.status()}}"></mark></td>
                    <td th:if="${inv.status() == 'PENDING' && inv.inviteeId() == currentMemberId}" th:data-label="#{invitation.actions}">
                        <div style="display:flex; gap:0.5rem; justify-content: flex-end; align-items: center;">
                            <form hx-post th:hx-post="@{/{tid}/invitations/{iid}/accept(tid=${inv.tripId()},iid=${inv.invitationId()})}"
                                  hx-target="#invitations"
                                  hx-swap="innerHTML"
                                  hx-disabled-elt="find [type=submit]">
                                <button type="submit" class="outline" style="padding:0.5rem 0.8rem;" th:attr="aria-label=#{invitation.accept},title=#{invitation.accept}">✓</button>
                            </form>
                            <form hx-post th:hx-post="@{/{tid}/invitations/{iid}/decline(tid=${inv.tripId()},iid=${inv.invitationId()})}"
                                  hx-target="#invitations"
                                  hx-swap="innerHTML"
                                  hx-disabled-elt="find [type=submit]">
                                <button type="submit" class="outline secondary" style="padding:0.5rem 0.8rem;" th:attr="aria-label=#{invitation.decline},title=#{invitation.decline}">&times;</button>
                            </form>
                        </div>
                    </td>
                    <td th:if="${inv.status() != 'PENDING' || inv.inviteeId() != currentMemberId}"></td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${invitations.isEmpty()}" th:text="#{invitation.empty}">Noch keine Einladungen.</p>
</div>
</body>
</html>
