<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="invitationList">
    <figure class="table-cards">
        <table th:if="${!invitations.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{invitation.member}">Mitglied</th>
                    <th th:text="#{trip.status}">Status</th>
                    <th class="table-actions-header" th:text="#{common.actions}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inv : ${invitations}">
                    <td th:data-label="#{invitation.member}">
                        <span th:text="${inv.inviteeName()}"></span>
                        <small th:if="${inv.invitationType() == 'EXTERNAL'}" th:text="#{invitation.statusExternal}"> (extern)</small>
                        <small th:if="${inv.targetPartyName() != null}"
                               th:text="|#{invitation.party}: ${inv.targetPartyName()}|">Reisepartei: Familie Test</small>
                    </td>
                    <td th:data-label="#{trip.status}"><mark th:text="#{${'invitation.status.' + inv.status()}}"></mark></td>
                    <td th:data-label="#{common.actions}" th:if="${inv.status() == 'PENDING' && inv.inviteeId() == currentMemberId}">
                        <div class="action-col">
                            <form hx-post th:hx-post="@{/{tid}/invitations/{iid}/accept(tid=${inv.tripId()},iid=${inv.invitationId()})}"
                                  hx-target="#invitations"
                                  hx-swap="innerHTML"
                                  hx-disabled-elt="find [type=submit]"
                                  style="margin:0;">
                                <button type="submit" class="btn-icon"
                                        th:title="#{invitation.accept}" th:aria-label="#{invitation.accept}">
                                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                                </button>
                            </form>
                            <form hx-post th:hx-post="@{/{tid}/invitations/{iid}/decline(tid=${inv.tripId()},iid=${inv.invitationId()})}"
                                  hx-target="#invitations"
                                  hx-swap="innerHTML"
                                  hx-disabled-elt="find [type=submit]"
                                  style="margin:0;">
                                <button type="submit" class="btn-icon btn-icon--danger"
                                        th:title="#{invitation.decline}" th:aria-label="#{invitation.decline}">
                                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </form>
                        </div>
                    </td>
                    <td th:data-label="#{common.actions}" th:if="${inv.status() != 'PENDING' || inv.inviteeId() != currentMemberId}"></td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${invitations.isEmpty()}" th:text="#{invitation.empty}">Noch keine Einladungen.</p>
</div>
</body>
</html>
