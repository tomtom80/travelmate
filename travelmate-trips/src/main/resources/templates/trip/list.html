<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <section th:if="${!pendingInvitations.isEmpty()}">
        <h2 th:text="#{invitation.pending.title}">Offene Einladungen</h2>
        <div class="grid" th:each="inv : ${pendingInvitations}">
            <article>
                <header>
                    <strong th:text="${inv.tripName()}">Skiurlaub 2026</strong>
                </header>
                <p>
                    <span th:text="#{invitation.pending.invitedBy}">Eingeladen von</span>
                    <strong th:text="${inv.inviterName()}">Max Mustermann</strong>
                </p>
                <p>
                    <th:block th:if="${inv.tripStartDate() != null && inv.tripEndDate() != null}">
                        <span th:text="${inv.tripStartDate()}">15.03.2026</span> –
                        <span th:text="${inv.tripEndDate()}">22.03.2026</span>
                    </th:block>
                    <span th:if="${inv.tripStartDate() == null || inv.tripEndDate() == null}"
                          th:text="#{trip.dateRange.pending}">Wird gemeinsam festgelegt</span>
                </p>
                <footer>
                    <div class="grid">
                        <form th:action="@{/{tripId}/invitations/{invId}/accept(tripId=${inv.tripId()},invId=${inv.invitationId()})}" method="post">
                            <button type="submit" th:text="#{invitation.accept}">Annehmen</button>
                        </form>
                        <form th:action="@{/{tripId}/invitations/{invId}/decline(tripId=${inv.tripId()},invId=${inv.invitationId()})}" method="post">
                            <button type="submit" class="secondary" th:text="#{invitation.decline}">Ablehnen</button>
                        </form>
                    </div>
                </footer>
            </article>
        </div>
    </section>

    <h1 th:text="#{trip.title}">Reisen</h1>
    <div class="table-toolbar">
        <a th:href="@{/new}" role="button" class="outline btn-add" th:text="#{trip.create}">
            Neue Reise planen
        </a>
    </div>

    <figure class="table-cards">
        <table th:if="${!trips.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{trip.name}">Name</th>
                    <th th:text="#{trip.startDate}">Von</th>
                    <th th:text="#{trip.endDate}">Bis</th>
                    <th th:text="#{trip.status}">Status</th>
                    <th class="table-actions-header" th:text="#{common.actions}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="trip : ${trips}">
                    <td th:data-label="#{trip.name}">
                        <a th:href="@{/{id}(id=${trip.tripId()})}"
                           th:text="${trip.name()}"></a>
                    </td>
                    <td th:data-label="#{trip.startDate}" th:text="${trip.startDate() != null ? trip.startDate() : '—'}"></td>
                    <td th:data-label="#{trip.endDate}" th:text="${trip.endDate() != null ? trip.endDate() : '—'}"></td>
                    <td th:data-label="#{trip.status}"><mark th:text="#{${'trip.status.' + trip.status()}}"></mark></td>
                    <td th:data-label="#{common.actions}">
                        <div class="action-col">
                            <a th:if="${trip.status() == 'COMPLETED'}"
                               th:href="|/expense/${trip.tripId()}|"
                               class="btn-icon"
                               th:title="#{trip.expense.action}" th:aria-label="#{trip.expense.action}">
                                <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="2" y1="9" x2="22" y2="9"/><line x1="10" y1="3" x2="10" y2="9"/></svg>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${trips.isEmpty()}" th:text="#{trip.empty}">Noch keine Reisen geplant.</p>


</div>
</body>
</html>
