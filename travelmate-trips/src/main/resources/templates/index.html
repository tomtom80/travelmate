<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <article class="page-hero page-hero--trip">
        <div class="page-hero__layout">
            <div class="page-hero__copy">
                <p class="page-hero__eyebrow" th:text="#{trip.plan}">Reiseplanung</p>
                <hgroup>
                    <h1 th:text="#{trip.plan}">Reiseplanung</h1>
                    <p class="page-hero__lead" th:text="#{trip.subtitle}">Reisen erstellen, Teilnehmer verwalten, Essensplan und Einkaufslisten.</p>
                </hgroup>
            </div>
            <div class="page-hero__art" aria-hidden="true">
                <svg th:replace="~{fragments/heroes :: hero-planning}"></svg>
            </div>
        </div>
    </article>
</div>
</body>
</html>
