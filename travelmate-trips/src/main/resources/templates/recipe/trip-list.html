<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <article class="page-hero page-hero--recipe">
        <div class="page-hero__layout">
            <div class="page-hero__copy">
                <p class="page-hero__eyebrow" th:text="#{recipe.trip.title}">Reise-Rezepte</p>
                <hgroup>
                    <h1 th:text="#{recipe.trip.title}">Reise-Rezepte</h1>
                    <p class="page-hero__lead"><a th:href="@{/{id}(id=${trip.tripId()})}" th:text="${trip.name()}">Reise</a></p>
                </hgroup>
                <div class="page-meta-list">
                    <div class="page-stat">
                        <strong th:text="${recipes.size()}">0</strong>
                        <span th:text="#{recipe.title}">Rezepte</span>
                    </div>
                </div>
                <div class="page-actions">
                    <a th:href="@{/{tid}/recipes/new(tid=${trip.tripId()})}" role="button"
                       th:text="#{recipe.create}">Neues Rezept</a>
                </div>
            </div>
            <div class="page-hero__art" aria-hidden="true">
                <svg viewBox="0 0 240 160">
                    <!-- Stylized Food icon (Pot/Plate) -->
                    <path d="M60 110h120c0 15-15 30-60 30s-60-15-60-30z" stroke-width="2.5"></path>
                    <path d="M70 110V85c0-10 10-15 50-15s50 5 50 15v25" stroke-width="2.5"></path>
                    <path d="M120 70V55" stroke-width="2.5"></path>
                    <circle cx="120" cy="50" r="5" stroke-width="2.5"></circle>
                </svg>
            </div>
        </div>
    </article>

    <section class="section-card">
        <h2 th:text="#{recipe.trip.title}">Reise-Rezepte</h2>

    <!-- Trip recipes table -->
    <figure class="table-cards" th:if="${!recipes.isEmpty()}">
        <table>
            <thead>
                <tr>
                    <th th:text="#{recipe.name}">Name</th>
                    <th th:text="#{recipe.servings}">Portionen</th>
                    <th th:text="#{recipe.ingredients}">Zutaten</th>
                    <th th:text="#{recipe.trip.contributedBy}">Beigesteuert von</th>
                    <th class="table-actions-header" th:text="#{common.actions}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${recipes}">
                    <td th:data-label="#{recipe.name}" th:text="${r.name()}"></td>
                    <td th:data-label="#{recipe.servings}" th:text="${r.servings()}"></td>
                    <td th:data-label="#{recipe.ingredients}" th:text="${r.ingredients().size()}"></td>
                    <td th:data-label="#{recipe.trip.contributedBy}" th:text="${r.contributedBy() ?: '—'}"></td>
                    <td th:data-label="#{common.actions}">
                        <div class="action-col">
                            <a th:href="@{/{tid}/recipes/{rid}/edit(tid=${trip.tripId()},rid=${r.recipeId()})}"
                               class="btn-icon"
                               th:title="#{common.edit}" th:aria-label="#{common.edit}">
                                <svg viewBox="0 0 24 24"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                            </a>
                            <form method="post" th:action="@{/{tid}/recipes/{rid}/delete(tid=${trip.tripId()},rid=${r.recipeId()})}"
                                  onsubmit="return confirm(this.dataset.confirmMsg);"
                                  th:data-confirm-msg="#{recipe.delete.confirm}"
                                  style="margin:0;">
                                <button type="submit" class="btn-icon btn-icon--danger"
                                        th:title="#{common.delete}" th:aria-label="#{common.delete}">
                                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${recipes.isEmpty()}" th:text="#{recipe.trip.empty}">Noch keine Rezepte fuer diese Reise.</p>

    </section>

    <!-- Share personal recipes into trip -->
    <section class="section-card" th:if="${!personalRecipes.isEmpty()}">
        <details>
            <summary th:text="#{recipe.trip.share}">Eigene Rezepte teilen</summary>
            <figure class="table-cards">
                <table>
                    <thead>
                        <tr>
                            <th th:text="#{recipe.name}">Name</th>
                            <th th:text="#{recipe.servings}">Portionen</th>
                            <th th:text="#{recipe.ingredients}">Zutaten</th>
                            <th class="table-actions-header"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${personalRecipes}">
                            <td th:data-label="#{recipe.name}" th:text="${r.name()}"></td>
                            <td th:data-label="#{recipe.servings}" th:text="${r.servings()}"></td>
                            <td th:data-label="#{recipe.ingredients}" th:text="${r.ingredients().size()}"></td>
                            <td>
                                <form method="post" th:action="@{/{tid}/recipes/{rid}/share(tid=${trip.tripId()},rid=${r.recipeId()})}"
                                      style="margin:0;">
                                    <button type="submit" class="outline" style="padding:0.25rem 0.75rem; font-size:0.85rem; margin:0; white-space:nowrap;"
                                            th:text="#{recipe.trip.shareButton}">Teilen</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </figure>
        </details>
    </section>

    <a th:href="@{/{id}(id=${trip.tripId()})}" role="button" class="outline" th:text="#{common.back}">Zurueck</a>
</div>
</body>
</html>
