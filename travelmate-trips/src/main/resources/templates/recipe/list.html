<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <hgroup>
        <h1 th:text="#{recipe.title}">Rezepte</h1>
        <p th:text="#{recipe.subtitle}">Deine Rezeptsammlung fuer die Reiseplanung.</p>
    </hgroup>

    <a th:href="@{/recipes/new}" role="button" th:text="#{recipe.create}">Neues Rezept</a>

    <figure class="table-cards" th:if="${!recipes.isEmpty()}">
        <table class="responsive-card-table">
            <thead>
                <tr>
                    <th th:text="#{recipe.name}">Name</th>
                    <th th:text="#{recipe.servings}">Portionen</th>
                    <th th:text="#{recipe.ingredients}">Zutaten</th>
                    <th th:text="#{invitation.actions}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${recipes}">
                    <td th:data-label="#{recipe.name}" th:text="${r.name()}"></td>
                    <td th:data-label="#{recipe.servings}" th:text="${r.servings()}"></td>
                    <td th:data-label="#{recipe.ingredients}" th:text="${r.ingredients().size()}"></td>
                    <td th:data-label="#{invitation.actions}">
                        <div style="display:flex; gap:0.5rem; justify-content: flex-end; align-items: center;">
                            <a th:href="@{/recipes/{id}/edit(id=${r.recipeId()})}"
                               role="button" class="outline"
                               style="padding:0.5rem 0.8rem;"
                               th:attr="aria-label=#{common.edit},title=#{common.edit}">✎</a>
                            <form method="post" th:action="@{/recipes/{id}/delete(id=${r.recipeId()})}"
                                  onsubmit="return confirm(this.dataset.confirmMsg);"
                                  th:data-confirm-msg="#{recipe.delete.confirm}"
                                  style="margin:0;">
                                <button type="submit" class="outline secondary"
                                        style="padding:0.5rem 0.8rem;"
                                        th:attr="aria-label=#{common.delete},title=#{common.delete}">&times;</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${recipes.isEmpty()}" th:text="#{recipe.empty}">Noch keine Rezepte vorhanden.</p>

    <a th:href="@{/}" th:text="#{common.back}">Zurueck</a>
</div>
</body>
</html>
