<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <h1 th:if="${recipe != null}" th:text="#{recipe.edit}">Rezept bearbeiten</h1>
    <h1 th:if="${recipe == null}" th:text="#{recipe.create}">Rezept erstellen</h1>

    <form method="post" th:action="@{${formAction}}">
        <label for="name" th:text="#{recipe.name}">Name</label>
        <input type="text" id="name" name="name" required
               th:value="${recipe != null} ? ${recipe.name()} : ''">

        <label for="servings" th:text="#{recipe.servings}">Portionen</label>
        <input type="number" id="servings" name="servings" min="1" required
               th:value="${recipe != null} ? ${recipe.servings()} : '4'">

        <h3 th:text="#{recipe.ingredients}">Zutaten</h3>
        <div id="ingredient-list">
            <!-- Existing ingredients (edit mode) -->
            <th:block th:if="${recipe != null}">
                <div th:each="ing : ${recipe.ingredients()}" class="ingredient-row" style="display:flex; gap:0.5rem; align-items:end; margin-bottom:0.5rem;">
                    <label style="flex:3; margin-bottom:0;">
                        <input type="text" name="ingredientName" th:value="${ing.name()}"
                               th:placeholder="#{recipe.ingredient.name}" required style="margin-bottom:0;">
                    </label>
                    <label style="flex:1; margin-bottom:0;">
                        <input type="number" name="ingredientQuantity" step="0.001" min="0.001"
                               th:value="${ing.quantity()}" th:placeholder="#{recipe.ingredient.quantity}" required style="margin-bottom:0;">
                    </label>
                    <label style="flex:1; margin-bottom:0;">
                        <input type="text" name="ingredientUnit" th:value="${ing.unit()}"
                               th:placeholder="#{recipe.ingredient.unit}" required style="margin-bottom:0;">
                    </label>
                    <button type="button" class="btn-icon btn-icon--danger" onclick="this.closest('.ingredient-row').remove()"
                            th:title="#{common.remove}" th:aria-label="#{common.remove}">
                        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </th:block>
            <!-- Default empty row (create mode) -->
            <div th:if="${recipe == null}" class="ingredient-row" style="display:flex; gap:0.5rem; align-items:end; margin-bottom:0.5rem;">
                <label style="flex:3; margin-bottom:0;">
                    <input type="text" name="ingredientName"
                           th:placeholder="#{recipe.ingredient.name}" required style="margin-bottom:0;">
                </label>
                <label style="flex:1; margin-bottom:0;">
                    <input type="number" name="ingredientQuantity" step="0.001" min="0.001"
                           th:placeholder="#{recipe.ingredient.quantity}" required style="margin-bottom:0;">
                </label>
                <label style="flex:1; margin-bottom:0;">
                    <input type="text" name="ingredientUnit"
                           th:placeholder="#{recipe.ingredient.unit}" required style="margin-bottom:0;">
                </label>
                <button type="button" class="btn-icon btn-icon--danger" onclick="this.closest('.ingredient-row').remove()"
                        th:title="#{common.remove}" th:aria-label="#{common.remove}">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <button type="button" class="outline" id="add-ingredient-btn" style="margin-bottom:1.5rem;"
                th:text="#{recipe.ingredient.add}">Zutat hinzufuegen</button>

        <div class="grid">
            <a th:href="@{/recipes}" class="outline" role="button" style="text-align:center;" th:text="#{common.cancel}">Abbrechen</a>
            <button type="submit" th:text="#{common.save}">Speichern</button>
        </div>
    </form>

    <template id="ingredient-template">
        <div class="ingredient-row" style="display:flex; gap:0.5rem; align-items:end; margin-bottom:0.5rem;">
            <label style="flex:3; margin-bottom:0;">
                <input type="text" name="ingredientName"
                       th:placeholder="#{recipe.ingredient.name}" required style="margin-bottom:0;">
            </label>
            <label style="flex:1; margin-bottom:0;">
                <input type="number" name="ingredientQuantity" step="0.001" min="0.001"
                       th:placeholder="#{recipe.ingredient.quantity}" required style="margin-bottom:0;">
            </label>
            <label style="flex:1; margin-bottom:0;">
                <input type="text" name="ingredientUnit"
                       th:placeholder="#{recipe.ingredient.unit}" required style="margin-bottom:0;">
            </label>
            <button type="button" class="btn-icon btn-icon--danger" onclick="this.closest('.ingredient-row').remove()"
                    th:title="#{common.remove}" th:aria-label="#{common.remove}">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </template>

    <script>
    document.getElementById('add-ingredient-btn').addEventListener('click', function() {
        var template = document.getElementById('ingredient-template');
        var clone = template.content.cloneNode(true);
        document.getElementById('ingredient-list').appendChild(clone);
    });
    </script>
</div>
</body>
</html>
