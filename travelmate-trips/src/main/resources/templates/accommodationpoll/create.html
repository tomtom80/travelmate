<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <hgroup>
        <h1 th:text="#{accommodationpoll.create}">Unterkunftsabstimmung erstellen</h1>
        <p><a th:href="@{/{id}(id=${trip.tripId()})}" th:text="${trip.name()}">Reise</a></p>
    </hgroup>

    <article class="poll-panel poll-panel--form">
        <p class="candidate-entry__intro" th:text="#{accommodationpoll.createHint}">
            Erfasse mindestens zwei Unterkuenfte mit Zimmern, damit die Gruppe sinnvoll vergleichen kann.
        </p>

        <form method="post" th:action="@{/{id}/accommodationpoll/create(id=${trip.tripId()})}" id="accommodationpoll-form">
            <div id="candidates" class="candidate-entry-list"></div>

            <div class="poll-footer-actions">
                <button type="button" class="outline" id="add-candidate-btn" th:text="#{accommodationpoll.addCandidate}">
                    Unterkunft hinzufuegen
                </button>
            </div>

            <div class="poll-footer-actions">
                <button type="submit" th:text="#{accommodationpoll.create}">Erstellen</button>
                <a th:href="@{/{id}/accommodationpoll(id=${trip.tripId()})}" role="button" class="outline secondary"
                   th:text="#{common.cancel}">Abbrechen</a>
            </div>
        </form>
    </article>

    <template id="candidate-template">
        <section class="candidate-entry">
            <div class="candidate-entry__header">
                <div>
                    <h3 th:text="#{accommodationpoll.addCandidate}">Unterkunft hinzufuegen</h3>
                    <p th:text="#{accommodationpoll.candidateHint}">Lege Name, Link, Beschreibung und Zimmer an.</p>
                </div>
            </div>

            <div class="candidate-entry__fields">
                <label>
                    <span th:text="#{accommodationpoll.candidateName}">Name</span>
                    <input type="text" name="candidateName" required>
                </label>
                <div class="grid">
                    <label>
                        <span th:text="#{accommodationpoll.candidateUrl}">URL</span>
                        <input type="url" name="candidateUrl">
                    </label>
                    <label>
                        <span th:text="#{accommodationpoll.candidateAddress}">Adresse</span>
                        <input type="text" name="candidateAddress">
                    </label>
                </div>
                <label>
                    <span th:text="#{accommodationpoll.candidateDescription}">Beschreibung</span>
                    <input type="text" name="candidateDescription">
                </label>
            </div>

            <input type="hidden" name="candidateRoomsJson" class="candidate-rooms-data" value="[]">
            <input type="hidden" name="candidateAmenitiesJson" class="candidate-amenities-data" value="[]">

            <div class="amenity-grid" th:if="${allAmenities != null}">
                <strong th:text="#{accommodationpoll.amenities}">Ausstattung</strong>
                <div class="amenity-checkbox-grid">
                    <label class="amenity-checkbox" th:each="amenity : ${allAmenities}">
                        <input type="checkbox" class="candidate-amenity" th:value="${amenity.name()}">
                        <span th:text="#{${'amenity.' + amenity.name()}}">Amenity</span>
                    </label>
                </div>
            </div>

            <div class="candidate-entry__rooms-section">
                <div class="candidate-entry__rooms-header">
                    <strong th:text="#{accommodationpoll.rooms}">Zimmer</strong>
                    <button type="button" class="outline secondary add-room-btn" th:text="#{accommodationpoll.addRoom}">
                        Zimmer hinzufuegen
                    </button>
                </div>
                <div class="room-rows"></div>
            </div>

            <button type="button" class="outline secondary remove-candidate-btn"
                    th:text="#{common.remove}">Entfernen</button>
        </section>
    </template>

    <template id="room-row-template">
        <div class="room-row">
            <div class="room-row__grid">
                <div class="room-row__field">
                    <label>
                        <span th:text="#{accommodationpoll.room.name}">Zimmer</span>
                        <input type="text" name="roomName" required>
                    </label>
                </div>
                <div class="room-row__field room-row__field--narrow">
                    <label>
                        <span th:text="#{accommodationpoll.room.bedCount}">Betten</span>
                        <input type="number" min="1" name="roomBedCount" required>
                    </label>
                </div>
                <div class="room-row__field room-row__field--narrow">
                    <label>
                        <span th:text="#{accommodationpoll.room.pricePerNight}">Preis/Nacht</span>
                        <input type="number" step="0.01" min="0" name="roomPricePerNight">
                    </label>
                </div>
                <div class="room-row__field">
                    <label>
                        <span th:text="#{accommodationpoll.room.bedDescription}">Details</span>
                        <input type="text" name="roomBedDescription">
                    </label>
                </div>
            </div>
            <button type="button" class="outline secondary remove-room-btn"
                    style="padding:0.25rem 0.75rem; font-size:0.85rem;"
                    th:text="#{common.remove}">Entfernen</button>
        </div>
    </template>

    <script>
        const candidatesContainer = document.getElementById('candidates');
        const candidateTemplate = document.getElementById('candidate-template');
        const roomTemplate = document.getElementById('room-row-template');

        document.getElementById('add-candidate-btn').addEventListener('click', function() {
            addCandidateEntry();
        });

        candidatesContainer.addEventListener('input', function(event) {
            const entry = event.target.closest('.candidate-entry');
            if (entry) {
                updateRoomData(entry);
            }
        });

        candidatesContainer.addEventListener('click', function(event) {
            const entry = event.target.closest('.candidate-entry');
            if (event.target.closest('.add-room-btn') && entry) {
                addRoomRow(entry);
            }
            if (event.target.closest('.remove-room-btn')) {
                const row = event.target.closest('.room-row');
                if (row) {
                    row.remove();
                }
                if (entry) {
                    updateRoomData(entry);
                }
            }
            if (event.target.closest('.remove-candidate-btn') && entry) {
                entry.remove();
            }
        });

        function addRoomRow(entry) {
            const clone = roomTemplate.content.cloneNode(true);
            entry.querySelector('.room-rows').appendChild(clone);
            updateRoomData(entry);
        }

        function updateRoomData(entry) {
            const rooms = Array.from(entry.querySelectorAll('.room-row')).map(row => ({
                name: row.querySelector('input[name="roomName"]').value,
                bedCount: row.querySelector('input[name="roomBedCount"]').value,
                pricePerNight: row.querySelector('input[name="roomPricePerNight"]').value,
                bedDescription: row.querySelector('input[name="roomBedDescription"]').value
            })).filter(room => room.name || room.bedCount || room.pricePerNight || room.bedDescription);
            entry.querySelector('.candidate-rooms-data').value = JSON.stringify(rooms);
        }

        function updateAmenityData(entry) {
            const amenities = Array.from(entry.querySelectorAll('.candidate-amenity:checked'))
                .map(cb => cb.value);
            entry.querySelector('.candidate-amenities-data').value = JSON.stringify(amenities);
        }

        function addCandidateEntry() {
            const clone = candidateTemplate.content.cloneNode(true);
            candidatesContainer.appendChild(clone);
            const entry = candidatesContainer.lastElementChild;
            addRoomRow(entry);
        }

        document.getElementById('accommodationpoll-form').addEventListener('submit', function() {
            document.querySelectorAll('.candidate-entry').forEach(entry => {
                updateRoomData(entry);
                updateAmenityData(entry);
            });
        });

        addCandidateEntry();
        addCandidateEntry();
    </script>
</div>
</body>
</html>
