<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ? ${title} + ' — Travelmate' : 'Travelmate'">Travelmate</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
</head>
<body>
    <nav>
        <a href="/" th:text="#{nav.brand}">Travelmate</a>
        <a href="/iam/" th:text="#{nav.travelGroup}">Reisegruppe</a>
        <a href="/trips/" th:text="#{nav.trips}">Reisen</a>
        <a href="/expense/" th:text="#{nav.expense}">Abrechnung</a>
        <span>
            <a th:href="@{''(lang='de')}" th:text="#{common.german}">Deutsch</a> |
            <a th:href="@{''(lang='en')}" th:text="#{common.english}">English</a>
        </span>
    </nav>
    <main th:insert="~{${view} :: content}">
    </main>
</body>
</html>
