<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <article class="page-hero page-hero--trip">
        <div class="page-hero__layout">
            <div class="page-hero__copy">
                <p class="page-hero__eyebrow" th:text="#{mealplan.title}">Essensplan</p>
                <hgroup>
                    <h1 th:text="#{mealplan.title}">Essensplan</h1>
                    <p class="page-hero__lead"><a th:href="@{/{id}(id=${trip.tripId()})}" th:text="${trip.name()}">Reise</a></p>
                </hgroup>
                <div class="page-meta-list">
                    <div class="page-stat">
                        <strong th:text="${slotsByDate.size()}">0</strong>
                        <span th:text="#{trip.stayPeriod}">Tage</span>
                    </div>
                </div>
            </div>
            <div class="page-hero__art" aria-hidden="true">
                <svg th:replace="~{fragments/heroes :: hero-mealplan}"></svg>
            </div>
        </div>
    </article>

    <section class="section-card">
        <h2 th:text="#{mealplan.title}">Essensplan</h2>

    <!-- Desktop: Table layout (hidden on mobile) -->
    <figure class="mealplan-desktop">
        <table>
            <thead>
                <tr>
                    <th th:text="#{mealplan.date}">Datum</th>
                    <th th:text="#{mealType.BREAKFAST}">Fruehstueck</th>
                    <th th:text="#{mealType.LUNCH}">Mittagessen</th>
                    <th th:text="#{mealType.DINNER}">Abendessen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${slotsByDate}">
                    <td><strong th:text="${entry.key}"></strong></td>
                    <td th:each="slot : ${entry.value}"
                        th:insert="~{mealplan/overview :: slotContent(${slot})}"></td>
                </tr>
            </tbody>
        </table>
    </figure>

    <!-- Mobile: Day-by-day accordion (hidden on desktop) -->
    <div class="mealplan-mobile">
        <article th:each="entry : ${slotsByDate}" style="margin-bottom:0.5rem;">
            <details>
                <summary><strong th:text="${entry.key}"></strong></summary>
                <div th:each="slot : ${entry.value}" style="margin-bottom:0.75rem; padding:0.5rem; border-left:3px solid var(--pico-primary);">
                    <small><strong th:text="#{${'mealType.' + slot.mealType()}}">Mahlzeit</strong></small>
                    <div th:insert="~{mealplan/overview :: slotContent(${slot})}"></div>
                </div>
            </details>
        </article>
    </div>

    </section>

    <div style="margin-top:1.5rem;">
        <a th:href="@{/{id}(id=${trip.tripId()})}" role="button" class="outline" th:text="#{common.back}">Zurueck</a>
    </div>
</div>

<!-- Shared fragment for slot content (used by both desktop and mobile) -->
<div th:fragment="slotContent(slot)" th:remove="tag">
    <div th:switch="${slot.status()}">
        <span th:case="'SKIP'" class="mealslot-skip" th:text="#{mealSlotStatus.SKIP}">Auslassen</span>
        <span th:case="'EATING_OUT'" class="mealslot-eating-out" th:text="#{mealSlotStatus.EATING_OUT}">Auswaerts essen</span>
        <span th:case="*">
            <span th:if="${slot.recipeName()}" th:text="${slot.recipeName()}"></span>
            <em th:unless="${slot.recipeName()}" th:text="#{mealplan.noRecipe}">Kein Rezept</em>
        </span>
    </div>
    <form method="post"
          th:action="@{/{tid}/mealplan/slots/{sid}/status(tid=${trip.tripId()},sid=${slot.slotId()})}"
          style="margin:0.25rem 0 0 0;">
        <select name="status" onchange="this.form.submit()" style="margin-bottom:0; padding:0.25rem; font-size:0.85rem;">
            <option value="PLANNED" th:selected="${slot.status() == 'PLANNED'}" th:text="#{mealSlotStatus.PLANNED}">Geplant</option>
            <option value="SKIP" th:selected="${slot.status() == 'SKIP'}" th:text="#{mealSlotStatus.SKIP}">Auslassen</option>
            <option value="EATING_OUT" th:selected="${slot.status() == 'EATING_OUT'}" th:text="#{mealSlotStatus.EATING_OUT}">Auswaerts</option>
        </select>
    </form>
    <form th:if="${slot.status() == 'PLANNED'}" method="post"
          th:action="@{/{tid}/mealplan/slots/{sid}/recipe(tid=${trip.tripId()},sid=${slot.slotId()})}"
          style="margin:0.25rem 0 0 0;">
        <select name="recipeId" onchange="this.form.submit()" style="margin-bottom:0; padding:0.25rem; font-size:0.85rem;">
            <option value="" th:text="#{mealplan.selectRecipe}">-- Rezept waehlen --</option>
            <option th:each="r : ${recipes}"
                    th:value="${r.recipeId()}"
                    th:selected="${slot.recipeId() != null && slot.recipeId().equals(r.recipeId())}"
                    th:text="${r.name()}">
            </option>
        </select>
    </form>
</div>
</body>
</html>
