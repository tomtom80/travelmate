server:
  port: 8083
  servlet:
    context-path: /expense
  tomcat:
    use-relative-redirects: true

spring:
  application:
    name: travelmate-expense

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:travelmate_expense}
    username: ${DB_USER:travelmate}
    password: ${DB_PASSWORD:travelmate}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:7082/realms/travelmate/protocol/openid-connect/certs}

  thymeleaf:
    cache: false

travelmate:
  ocr:
    tessdata-path: ${TESSDATA_PATH:/usr/share/tesseract-ocr/5/tessdata}
    language: deu
  llm:
    enabled: ${LLM_ENABLED:false}
    base-url: ${LLM_BASE_URL:http://localhost:11434}
    model: ${LLM_MODEL:qwen3-vl:4b}
    timeout: ${LLM_TIMEOUT:120}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:7082/realms/travelmate
  rabbitmq:
    host: localhost
    port: 0

travelmate:
  llm:
    enabled: false
