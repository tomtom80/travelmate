<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="content">
    <hgroup>
        <h1 th:text="${tripName}">Reisename</h1>
        <p>
            <span th:text="#{expense.title}">Abrechnung</span> —
            <mark th:text="#{${'expense.status.' + expense.status()}}">Offen</mark>
        </p>
    </hgroup>

    <!-- Total Amount -->
    <article>
        <p>
            <strong th:text="#{expense.totalAmount}">Gesamtbetrag</strong>:
            <span th:text="${#numbers.formatDecimal(expense.totalAmount(), 1, 2)}">0.00</span> EUR
        </p>
    </article>

    <!-- Category Breakdown -->
    <article th:if="${!expense.categoryBreakdown().isEmpty()}">
        <h2 th:text="#{expense.categoryBreakdown}">Ausgaben nach Kategorie</h2>
        <figure>
            <table>
                <thead>
                    <tr>
                        <th th:text="#{expense.receipt.category}">Kategorie</th>
                        <th th:text="#{expense.receipt.amount}">Betrag</th>
                        <th th:text="#{expense.categoryBreakdown.receiptCount}">Belege</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${expense.categoryBreakdown()}">
                        <td th:text="#{${'expense.category.' + cat.category()}}">Kategorie</td>
                        <td th:text="${#numbers.formatDecimal(cat.total(), 1, 2) + ' EUR'}"></td>
                        <td th:text="${cat.receiptCount()}"></td>
                    </tr>
                </tbody>
            </table>
        </figure>
    </article>

    <!-- Daily Costs -->
    <article th:if="${!expense.dailyCosts().isEmpty()}">
        <h2 th:text="#{expense.dailyCosts}">Tageskosten</h2>
        <figure>
            <table>
                <thead>
                    <tr>
                        <th th:text="#{expense.dailyCosts.date}">Datum</th>
                        <th th:text="#{expense.dailyCosts.total}">Betrag</th>
                        <th th:text="#{expense.dailyCosts.receiptCount}">Belege</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="day : ${expense.dailyCosts()}">
                        <td th:text="${#temporals.format(day.date(), 'dd.MM.yyyy')}"></td>
                        <td th:text="${#numbers.formatDecimal(day.total(), 1, 2) + ' EUR'}"></td>
                        <td th:text="${day.receiptCount()}"></td>
                    </tr>
                </tbody>
            </table>
        </figure>
    </article>

    <!-- Receipts Section -->
    <article>
        <h2 th:text="#{expense.receipts}">Belege</h2>
        <div id="receipts">
            <div th:replace="~{expense/receipts :: receiptList}"></div>
        </div>

        <div th:if="${expense.status().name() != 'SETTLED'}" style="margin-top:1rem;">
            <button onclick="document.getElementById('add-receipt-dialog').showModal()"
                    th:text="#{expense.receipt.add}">Beleg hinzufuegen</button>
        </div>
    </article>

    <!-- Weightings Section -->
    <article>
        <h2 th:text="#{expense.weightings}">Gewichtung</h2>
        <div id="weightings">
            <div th:replace="~{expense/weightings :: weightingList}"></div>
        </div>
    </article>

    <!-- Participant Summary -->
    <article th:if="${!expense.participantSummaries().isEmpty()}">
        <h2 th:text="#{expense.participantSummary}">Teilnehmeruebersicht</h2>
        <figure>
            <table>
                <thead>
                    <tr>
                        <th th:text="#{expense.balance.participant}">Teilnehmer</th>
                        <th th:text="#{expense.participantSummary.totalPaid}">Bezahlt</th>
                        <th th:text="#{expense.participantSummary.fairShare}">Anteil</th>
                        <th th:text="#{expense.participantSummary.balance}">Saldo</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ps : ${expense.participantSummaries()}">
                        <td th:text="${participantNames[ps.participantId()] != null ? participantNames[ps.participantId()] : ps.participantId()}"></td>
                        <td th:text="${#numbers.formatDecimal(ps.totalPaid(), 1, 2) + ' EUR'}"></td>
                        <td th:text="${#numbers.formatDecimal(ps.fairShare(), 1, 2) + ' EUR'}"></td>
                        <td>
                            <span th:if="${ps.balance().signum() > 0}" style="color:green;">
                                +<span th:text="${#numbers.formatDecimal(ps.balance(), 1, 2)}"></span> EUR
                            </span>
                            <span th:if="${ps.balance().signum() < 0}" style="color:red;">
                                <span th:text="${#numbers.formatDecimal(ps.balance(), 1, 2)}"></span> EUR
                            </span>
                            <span th:if="${ps.balance().signum() == 0}">
                                <span th:text="${#numbers.formatDecimal(ps.balance(), 1, 2)}"></span> EUR
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </figure>
    </article>

    <!-- Settlement Plan -->
    <article th:if="${!expense.transfers().isEmpty()}">
        <h2 th:text="#{expense.settlementPlan}">Ausgleichszahlungen</h2>
        <figure>
            <table>
                <thead>
                    <tr>
                        <th th:text="#{expense.transfer.from}">Von</th>
                        <th></th>
                        <th th:text="#{expense.transfer.to}">An</th>
                        <th th:text="#{expense.transfer.amount}">Betrag</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="transfer : ${expense.transfers()}">
                        <td th:text="${participantNames[transfer.from()] != null ? participantNames[transfer.from()] : transfer.from()}"></td>
                        <td th:text="#{expense.transfer.pays}">zahlt</td>
                        <td th:text="${participantNames[transfer.to()] != null ? participantNames[transfer.to()] : transfer.to()}"></td>
                        <td th:text="${#numbers.formatDecimal(transfer.amount(), 1, 2) + ' EUR'}"></td>
                    </tr>
                </tbody>
            </table>
        </figure>
    </article>

    <!-- Settle Button -->
    <div th:if="${expense.status().name() != 'SETTLED' && !expense.receipts().isEmpty()}">
        <form method="post" th:action="@{/{id}/settle(id=${tripId})}">
            <button type="submit" class="contrast" th:text="#{expense.settle}">Abrechnung abschliessen</button>
        </form>
    </div>

    <!-- Dialog: Add Receipt -->
    <dialog id="add-receipt-dialog" th:if="${expense.status().name() != 'SETTLED'}">
        <article>
            <header>
                <button aria-label="Close" rel="prev"
                        onclick="document.getElementById('add-receipt-dialog').close()"></button>
                <h3 th:text="#{expense.receipt.add}">Beleg hinzufuegen</h3>
            </header>
            <form hx-post th:hx-post="@{/{id}/receipts(id=${tripId})}"
                  hx-target="#receipts"
                  hx-swap="innerHTML"
                  hx-disabled-elt="find [type=submit]"
                  hx-on::after-request="if(event.detail.successful) { this.reset(); document.getElementById('add-receipt-dialog').close(); }">
                <label>
                    <span th:text="#{expense.receipt.description}">Beschreibung</span>
                    <input type="text" name="description" required>
                </label>
                <div class="grid">
                    <label>
                        <span th:text="#{expense.receipt.amount}">Betrag</span>
                        <input type="number" name="amount" step="0.01" min="0.01" required>
                    </label>
                    <label>
                        <span th:text="#{expense.receipt.date}">Datum</span>
                        <input type="date" name="date" required>
                    </label>
                </div>
                <div class="grid">
                    <label>
                        <span th:text="#{expense.receipt.paidBy}">Bezahlt von</span>
                        <select name="paidBy" required>
                            <option th:each="entry : ${participantNames}"
                                    th:value="${entry.key}"
                                    th:text="${entry.value}">
                            </option>
                        </select>
                    </label>
                    <label>
                        <span th:text="#{expense.receipt.category}">Kategorie</span>
                        <select name="category">
                            <option value="ACCOMMODATION" th:text="#{expense.category.ACCOMMODATION}">Unterkunft</option>
                            <option value="GROCERIES" th:text="#{expense.category.GROCERIES}">Lebensmittel</option>
                            <option value="RESTAURANT" th:text="#{expense.category.RESTAURANT}">Restaurant</option>
                            <option value="ACTIVITY" th:text="#{expense.category.ACTIVITY}">Aktivitaet</option>
                            <option value="TRANSPORT" th:text="#{expense.category.TRANSPORT}">Transport</option>
                            <option value="FUEL" th:text="#{expense.category.FUEL}">Treibstoff</option>
                            <option value="HEALTH" th:text="#{expense.category.HEALTH}">Gesundheit</option>
                            <option value="OTHER" th:text="#{expense.category.OTHER}" selected>Sonstiges</option>
                        </select>
                    </label>
                </div>
                <footer>
                    <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                        <button type="button" class="secondary"
                                onclick="document.getElementById('add-receipt-dialog').close()"
                                th:text="#{common.cancel}">Abbrechen</button>
                        <button type="submit" th:text="#{expense.receipt.add}">Beleg hinzufuegen</button>
                    </div>
                </footer>
            </form>
        </article>
    </dialog>

    <a th:href="|/trips/${tripId}|" th:text="#{common.back}">Zurueck</a>
</div>
</body>
</html>
