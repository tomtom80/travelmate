<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="weightingList">
    <figure class="table-cards" th:if="${!expense.weightings().isEmpty()}">
        <table>
            <thead>
                <tr>
                    <th th:text="#{expense.weighting.participant}">Teilnehmer</th>
                    <th th:text="#{expense.weighting.ageOnTripStart}">Alter</th>
                    <th th:text="#{expense.weighting.weight}">Gewichtung</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="weighting : ${expense.weightings()}">
                    <td th:data-label="#{expense.weighting.participant}">
                        <div>
                            <span th:text="${weighting.participantName() != null ? weighting.participantName() : participantNames[weighting.participantId()]}"></span>
                            <small style="display:block; color:var(--tm-text-soft, #526071);"
                                   th:if="${weighting.recommendationType() == 'INFANT'}" th:text="#{expense.weighting.recommendationInfant}">Kleinkind unter 3</small>
                            <small style="display:block; color:var(--tm-text-soft, #526071);"
                                   th:if="${weighting.recommendationType() == 'CHILD'}" th:text="#{expense.weighting.recommendationChild}">Kind 3-16</small>
                        </div>
                    </td>
                    <td th:data-label="#{expense.weighting.ageOnTripStart}"
                        th:text="${weighting.ageOnTripStart() != null ? weighting.ageOnTripStart() : '—'}"></td>
                    <td th:data-label="#{expense.weighting.weight}">
                        <form th:if="${expense.status().name() != 'SETTLED'}"
                              hx-post th:hx-post="@{/{tripId}/weightings(tripId=${tripId})}"
                              hx-target="#weightings" hx-swap="innerHTML" style="margin:0;">
                            <input type="hidden" name="participantId" th:value="${weighting.participantId()}">
                            <div style="display:flex; gap:0.5rem; align-items:center;">
                                <input type="number" name="weight" min="0" step="0.1"
                                       th:value="${#numbers.formatDecimal(weighting.weight(), 1, 1)}"
                                       style="margin-bottom:0; max-width:5rem;">
                                <button type="submit" class="btn-icon"
                                        th:title="#{common.save}" th:aria-label="#{common.save}"
                                        style="margin-bottom:0;">
                                    <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                </button>
                            </div>
                        </form>
                        <span th:if="${expense.status().name() == 'SETTLED'}"
                              th:text="${#numbers.formatDecimal(weighting.weight(), 1, 1)}">1.0</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${!expense.weightings().isEmpty()}" style="color:var(--tm-text-soft, #526071); font-size:0.85rem;"
       th:text="#{expense.weighting.recommendationHint}">
        Kinder unter 3: 0.0, 3-16: 0.5, Erwachsene: 1.0
    </p>
</div>
</body>
</html>
