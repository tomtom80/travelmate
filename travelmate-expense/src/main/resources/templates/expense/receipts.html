<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<body>
<div th:fragment="receiptList">
    <figure class="table-cards" th:if="${!expense.receipts().isEmpty()}">
        <table class="responsive-card-table">
            <thead>
                <tr>
                    <th th:text="#{expense.receipt.description}">Beschreibung</th>
                    <th th:text="#{expense.receipt.amount}">Betrag</th>
                    <th th:text="#{expense.receipt.paidBy}">Bezahlt von</th>
                    <th th:text="#{expense.receipt.date}">Datum</th>
                    <th th:text="#{expense.receipt.category}">Kategorie</th>
                    <th th:if="${expense.reviewRequired()}" th:text="#{expense.receipt.reviewStatus}">Pruefstatus</th>
                    <th th:if="${expense.status().name() != 'SETTLED'}" th:text="#{common.edit}">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="receipt : ${expense.receipts()}">
                    <td th:data-label="#{expense.receipt.description}" th:text="${receipt.description()}"></td>
                    <td th:data-label="#{expense.receipt.amount}" th:text="${#numbers.formatDecimal(receipt.amount(), 1, 2) + ' EUR'}"></td>
                    <td th:data-label="#{expense.receipt.paidBy}" th:text="${participantNames[receipt.paidBy()] != null ? participantNames[receipt.paidBy()] : receipt.paidBy()}"></td>
                    <td th:data-label="#{expense.receipt.date}" th:text="${receipt.date()}"></td>
                    <td th:data-label="#{expense.receipt.category}" th:text="#{${'expense.category.' + receipt.category()}}">Sonstiges</td>
                    <td th:if="${expense.reviewRequired()}" th:data-label="#{expense.receipt.reviewStatus}">
                        <mark th:text="#{${'expense.reviewStatus.' + receipt.reviewStatus()}}">Status</mark>
                        <small th:if="${receipt.rejectionReason() != null}"
                               th:text="${receipt.rejectionReason()}" style="display:block; color:red;"></small>
                    </td>
                    <td th:if="${expense.status().name() != 'SETTLED'}" th:data-label="#{common.edit}">
                        <div style="display:flex; gap:0.25rem; flex-wrap:wrap; justify-content: flex-end;">
                            <!-- Approve/Reject for SUBMITTED receipts in review mode -->
                            <button th:if="${expense.reviewRequired() && receipt.reviewStatus().name() == 'SUBMITTED'}"
                                    class="outline"
                                    th:hx-post="@{/{tid}/receipts/{rid}/approve(tid=${tripId},rid=${receipt.receiptId()})}"
                                    hx-target="#receipts"
                                    hx-swap="innerHTML"
                                    th:text="#{expense.receipt.approve}">Genehmigen</button>
                            <button th:if="${expense.reviewRequired() && receipt.reviewStatus().name() == 'SUBMITTED'}"
                                    class="outline secondary"
                                    onclick="this.closest('td').querySelector('dialog').showModal()"
                                    th:text="#{expense.receipt.reject}">Ablehnen</button>
                            <!-- Reject dialog -->
                            <dialog th:if="${expense.reviewRequired() && receipt.reviewStatus().name() == 'SUBMITTED'}">
                                <article>
                                    <header>
                                        <button aria-label="Close" rel="prev"
                                                onclick="this.closest('dialog').close()"></button>
                                        <h3 th:text="#{expense.receipt.reject}">Ablehnen</h3>
                                    </header>
                                    <form th:hx-post="@{/{tid}/receipts/{rid}/reject(tid=${tripId},rid=${receipt.receiptId()})}"
                                          hx-target="#receipts" hx-swap="innerHTML"
                                          hx-on::after-request="if(event.detail.successful) this.closest('dialog').close()">
                                        <label>
                                            <span th:text="#{expense.receipt.rejectionReason}">Grund</span>
                                            <input type="text" name="reason" required>
                                        </label>
                                        <footer>
                                            <button type="submit" class="secondary" th:text="#{expense.receipt.reject}">Ablehnen</button>
                                        </footer>
                                    </form>
                                </article>
                            </dialog>
                            <!-- Resubmit button for REJECTED receipts -->
                            <button th:if="${receipt.reviewStatus().name() == 'REJECTED'}"
                                    class="outline"
                                    onclick="this.closest('td').querySelector('.resubmit-dialog').showModal()"
                                    th:text="#{expense.receipt.resubmit}">Erneut einreichen</button>
                            <!-- Resubmit dialog -->
                            <dialog th:if="${receipt.reviewStatus().name() == 'REJECTED'}" class="resubmit-dialog">
                                <article>
                                    <header>
                                        <button aria-label="Close" rel="prev"
                                                onclick="this.closest('dialog').close()"></button>
                                        <h3 th:text="#{expense.receipt.resubmit}">Erneut einreichen</h3>
                                    </header>
                                    <div role="alert" style="background:#fef2f2; border:1px solid #fecaca; border-radius:4px; padding:0.75rem; margin-bottom:1rem;">
                                        <strong th:text="#{expense.receipt.rejectionReason}">Ablehnungsgrund:</strong>
                                        <span th:text="${receipt.rejectionReason()}"></span>
                                    </div>
                                    <form th:hx-post="@{/{tid}/receipts/{rid}/resubmit(tid=${tripId},rid=${receipt.receiptId()})}"
                                          hx-target="#receipts" hx-swap="innerHTML"
                                          hx-on::after-request="if(event.detail.successful) this.closest('dialog').close()">
                                        <label>
                                            <span th:text="#{expense.receipt.description}">Beschreibung</span>
                                            <input type="text" name="description" required th:value="${receipt.description()}">
                                        </label>
                                        <label>
                                            <span th:text="#{expense.receipt.amount}">Betrag</span>
                                            <input type="number" name="amount" step="0.01" min="0.01" required th:value="${receipt.amount()}">
                                        </label>
                                        <label>
                                            <span th:text="#{expense.receipt.date}">Datum</span>
                                            <input type="date" name="date" required th:value="${receipt.date()}">
                                        </label>
                                        <label>
                                            <span th:text="#{expense.receipt.category}">Kategorie</span>
                                            <select name="category">
                                                <option th:each="cat : ${T(de.evia.travelmate.expense.domain.expense.ExpenseCategory).values()}"
                                                        th:value="${cat}" th:text="#{${'expense.category.' + cat}}"
                                                        th:selected="${cat.name() == receipt.category()}"></option>
                                            </select>
                                        </label>
                                        <footer>
                                            <button type="submit" th:text="#{expense.receipt.resubmit}">Erneut einreichen</button>
                                        </footer>
                                    </form>
                                </article>
                            </dialog>
                            <!-- Remove button for non-settled receipts -->
                            <button th:if="${receipt.reviewStatus().name() != 'APPROVED'}"
                                    class="outline secondary"
                                    th:hx-delete="@{/{tid}/receipts/{rid}(tid=${tripId},rid=${receipt.receiptId()})}"
                                    hx-target="#receipts"
                                    hx-swap="innerHTML"
                                    hx-confirm="true"
                                    th:text="#{expense.receipt.remove}">Entfernen</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
    <p th:if="${expense.receipts().isEmpty()}" th:text="#{expense.receipt.empty}">Noch keine Belege vorhanden.</p>
</div>
</body>
</html>
