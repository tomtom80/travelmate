<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/iam/images/icon-192.png">
    <link rel="apple-touch-icon" href="/iam/images/icon-192.png">
    <title th:text="${title} ? ${title} + ' — Travelmate' : 'Travelmate'">Travelmate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
    <script src="/assets/js/scripts.js" defer></script>
</head>
<body>
    <nav class="container">
        <ul>
            <li>
                <a href="/iam/dashboard">
                    <img src="/assets/images/logo.svg" alt="Travelmate Logo" class="brand-logo">
                    <strong th:text="#{nav.brand}">Travelmate</strong>
                </a>
            </li>
        </ul>
        <ul>
            <li><a href="/iam/dashboard" th:text="#{nav.travelParty}">Reisepartei</a></li>
            <li><a href="/trips/" th:text="#{nav.trips}">Reisen</a></li>
            <li>
                <a th:href="@{''(lang='de')}" th:text="#{common.german}">DE</a> /
                <a th:href="@{''(lang='en')}" th:text="#{common.english}">EN</a>
            </li>
            <li>
                <form method="post" action="/logout" style="margin:0;">
                    <button type="submit" class="outline secondary" th:text="#{nav.logout}">Abmelden</button>
                </form>
            </li>
        </ul>
    </nav>
    <main class="container" th:insert="~{${view} :: content}">
    </main>
    <div id="dropdown-backdrop"></div>
    <div id="toast-container" aria-live="polite"></div>
    <footer class="container">
        <small>Travelmate</small>
    </footer>
    <script>
    document.addEventListener('submit', function(e) {
        var btn = e.target.querySelector('button[type=submit]');
        if (btn && !e.target.hasAttribute('hx-post') && !e.target.hasAttribute('hx-delete')) {
            btn.setAttribute('aria-busy', 'true');
            btn.disabled = true;
        }
    });
    document.addEventListener('showToast', function(e) {
        var d = e.detail, level = d.level || 'info', msg = d.message || '';
        var toast = document.createElement('div');
        toast.className = 'toast toast-' + level;
        toast.setAttribute('role', level === 'error' ? 'alert' : 'status');
        var text = document.createElement('span');
        text.textContent = msg;
        toast.appendChild(text);
        var btn = document.createElement('button');
        btn.className = 'toast-close';
        btn.setAttribute('aria-label', 'Close');
        btn.textContent = '\u00d7';
        btn.onclick = function() { toast.remove(); };
        toast.appendChild(btn);
        document.getElementById('toast-container').appendChild(toast);
        if (level !== 'error') {
            setTimeout(function() {
                toast.style.animation = 'toastOut 0.3s ease-in forwards';
                setTimeout(function() { toast.remove(); }, 300);
            }, 4000);
        }
    });
    </script>
</body>
</html>
