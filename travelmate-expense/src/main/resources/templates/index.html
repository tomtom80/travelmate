<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<body>
<div th:fragment="content">
    <article class="page-hero page-hero--expense">
        <div class="page-hero__layout">
            <div class="page-hero__copy">
                <p class="page-hero__eyebrow" th:text="#{expense.title}">Abrechnung</p>
                <hgroup>
                    <h1 th:text="#{expense.title}">Abrechnung</h1>
                    <p class="page-hero__lead" th:text="#{expense.home.info}">Waehlen Sie eine Reise aus, um die Abrechnung einzusehen.</p>
                </hgroup>
                <div class="page-actions">
                    <a href="/trips/" role="button" th:text="#{nav.trips}">Reisen</a>
                </div>
            </div>
            <div class="page-hero__art" aria-hidden="true">
                <svg viewBox="0 0 240 160">
                    <!-- Stylized Money icon (Banknote & Coin) -->
                    <rect x="50" y="50" width="120" height="70" rx="8" stroke-width="2.5"></rect>
                    <circle cx="110" cy="85" r="18" stroke-width="2.5"></circle>
                    <path d="M110 75v20M100 85h20" stroke-width="2"></path>
                    <circle cx="180" cy="100" r="25" stroke-width="2.5"></circle>
                    <path d="M180 90v20M170 100h20" stroke-width="2"></path>
                </svg>
            </div>
        </div>
    </article>
</div>
</body>
</html>
