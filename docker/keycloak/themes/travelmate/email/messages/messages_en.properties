passwordResetBodyHtml=<h2 style="color:#162030;margin:0 0 12px;font-size:24px;font-weight:700;letter-spacing:-0.01em;line-height:1.2;">Reset your password</h2><p>A password reset was requested for your Travelmate account. Click the button below to set a new password:</p><p style="text-align:center;margin:1.5rem 0;"><a href="{0}" style="display:inline-block;padding:14px 28px;background-color:#3366CC;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:700;letter-spacing:0.01em;">Reset Password</a></p><p style="color:#64748b;font-size:0.875rem;">This link will expire within {3}. If you did not request this, you can safely ignore this email.</p>

