emailVerificationSubject=Travelmate: Verify your email address
emailVerificationBody=Welcome to Travelmate!\n\nPlease verify your email address by clicking the link below:\n\n{0}\n\nThis link will expire within {3}.\n\nIf you did not create an account, you can safely ignore this email.
emailVerificationBodyHtml=<h2 style="color:#162030;margin:0 0 12px;font-size:24px;font-weight:700;letter-spacing:-0.01em;line-height:1.2;">Welcome to Travelmate!</h2><p>Please verify your email address by clicking the button below:</p><p style="text-align:center;margin:1.5rem 0;"><a href="{0}" style="display:inline-block;padding:14px 28px;background-color:#3366CC;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:700;letter-spacing:0.01em;">Verify Email</a></p><p style="color:#64748b;font-size:0.875rem;">This link will expire within {3}. If you did not create an account, you can safely ignore this email.</p>

