emailVerificationSubject=Travelmate: Verify your email address
emailVerificationBody=Welcome to Travelmate!\n\nPlease verify your email address by clicking the link below:\n\n{0}\n\nThis link will expire within {3}.\n\nIf you did not create an account, you can safely ignore this email.
emailVerificationBodyHtml=<h2 style="color:#1095c1;margin-top:0;">Welcome to Travelmate!</h2><p>Please verify your email address by clicking the button below:</p><p style="text-align:center;margin:1.5rem 0;"><a href="{0}" style="display:inline-block;padding:0.75rem 1.5rem;background-color:#1095c1;color:#ffffff;text-decoration:none;border-radius:0.375rem;font-weight:600;">Verify Email</a></p><p style="color:#64748b;font-size:0.875rem;">This link will expire within {3}. If you did not create an account, you can safely ignore this email.</p>

passwordResetSubject=Travelmate: Reset your password
passwordResetBody=A password reset was requested for your Travelmate account. If this was you, click the link below:\n\n{0}\n\nThis link will expire within {3}.\n\nIf you did not request this, you can safely ignore this email.
passwordResetBodyHtml=<h2 style="color:#1095c1;margin-top:0;">Reset your password</h2><p>A password reset was requested for your Travelmate account. Click the button below to set a new password:</p><p style="text-align:center;margin:1.5rem 0;"><a href="{0}" style="display:inline-block;padding:0.75rem 1.5rem;background-color:#1095c1;color:#ffffff;text-decoration:none;border-radius:0.375rem;font-weight:600;">Reset Password</a></p><p style="color:#64748b;font-size:0.875rem;">This link will expire within {3}. If you did not request this, you can safely ignore this email.</p>

executeActionsSubject=Travelmate: Action required for your account
executeActionsBody=Please complete the following action(s) for your Travelmate account: {3}.\n\nClick the link below to proceed:\n\n{0}\n\nThis link will expire within {4}.\n\nIf you did not expect this, you can safely ignore this email.
